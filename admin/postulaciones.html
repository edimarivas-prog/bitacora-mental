<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Postulaciones - Admin Bitácora</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root { 
      --sidebar-bg: #1F2933; --sidebar-text: #94A3B8; --primary: #4F6F52; 
      --bg: #F3F4F6; --white: #FFFFFF; --text: #1F2933; --border: #E5E7EB; 
      --radius: 20px; --danger: #EF4444; --success: #10B981; --info: #3B82F6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }

    /* SIDEBAR UNIFICADO */
    .sidebar { width: 260px; background: var(--sidebar-bg); color: white; padding: 24px; position: fixed; height: 100%; top: 0; left: 0; display: flex; flex-direction: column; z-index: 100; overflow-y: auto; scrollbar-width: none;}
    .sidebar::-webkit-scrollbar { display: none; }
    .logo { font-family: 'Outfit', sans-serif; font-weight: 700; color: white; font-size: 1.3rem; text-decoration: none; display: flex; align-items: center; gap: 10px; margin-bottom: 30px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 12px; }
    .nav-section { margin-bottom: 25px; }
    .nav-title { font-size: 0.7rem; text-transform: uppercase; color: var(--sidebar-text); font-weight: 700; padding-left: 12px; margin-bottom: 8px; letter-spacing: 1px; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; color: #CBD5E1; text-decoration: none; border-radius: 12px; transition: 0.2s; font-size: 0.95rem; margin-bottom: 4px;}
    .nav-item:hover, .nav-item.active { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(79, 111, 82, 0.4); }
    .nav-item i { width: 20px; text-align: center; }
    .badge-alert { background: var(--danger); color: white; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; font-weight: 700; margin-left: auto; display: none; }
    .badge-info { background: var(--info); color: white; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; font-weight: 700; margin-left: auto; display: none; }
    .submenu { display: flex; flex-direction: column; gap: 2px; padding-left: 36px; margin-top: 4px; }
    .submenu a { color: #94A3B8; text-decoration: none; font-size: 0.85rem; padding: 8px 10px; border-radius: 8px; transition: 0.2s; display: flex; align-items: center; gap: 8px;}
    .submenu a:hover { background: rgba(255,255,255,0.05); color: white; }

    /* CONTENIDO */
    .main { flex: 1; padding: 30px 40px; margin-left: 260px; max-width: 100%; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .header h1 { font-family: 'Outfit'; font-size: 2rem; margin: 0; }

    /* TABLA */
    .table-card { background: white; border-radius: var(--radius); overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.03); border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 18px; color: #64748B; font-size: 0.75rem; text-transform: uppercase; background: #F8FAFC; border-bottom: 1px solid var(--border); }
    td { padding: 18px; border-bottom: 1px solid #F1F5F9; font-size: 0.9rem; }
    
    .status { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
    .status-nueva { background: #DBEAFE; color: #1E40AF; }
    .status-revision { background: #FEF3C7; color: #92400E; }
    
    .btn-cv { background: #F1F5F9; color: var(--text); padding: 6px 12px; border-radius: 8px; text-decoration: none; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; border: 1px solid var(--border); transition: 0.2s; }
    .btn-cv:hover { background: var(--primary); color: white; border-color: var(--primary); }

    .action-btns { display: flex; gap: 8px; }
    .btn-act { border: none; background: none; cursor: pointer; font-size: 1.1rem; color: #94A3B8; transition: 0.2s; }
    .btn-act:hover { color: var(--primary); }
    .btn-delete:hover { color: var(--danger); }
  </style>
</head>
<body>

  <aside class="sidebar">
    <a href="#" class="logo"><i class="fas fa-brain"></i> ADMIN PRO</a>
    <div class="nav-section">
      <div class="nav-title">PANEL PRINCIPAL</div>
      <a href="panel-admin.html" class="nav-item"><i class="fas fa-chart-pie"></i> Resumen</a>
    </div>
    <div class="nav-section">
      <div class="nav-title">GESTIÓN CLÍNICA</div>
      <a href="verificacion.html" class="nav-item"><i class="fas fa-user-check"></i> Verificación C.Ps.P. <span id="globalBadgePending" class="badge-alert">0</span></a>
      <a href="postulaciones.html" class="nav-item active"><i class="fas fa-file-contract"></i> Postulaciones (CVs) <span id="globalBadgeCVs" class="badge-info">0</span></a>
      <a href="gestion-usuarios.html" class="nav-item"><i class="fas fa-users"></i> Usuarios</a>
    </div>
    <div class="nav-section">
      <div class="nav-title">CMS & CONTENIDO</div>
      <div class="submenu">
        <a href="editores/index.html"><i class="fas fa-home"></i> Página Inicio</a>
        <a href="editores/especialistas.html"><i class="fas fa-user-md"></i> Especialistas</a>
      </div>
    </div>
    <div style="margin-top:auto;">
      <a href="#" onclick="logout()" class="nav-item" style="color:#FCA5A5"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a>
    </div>
  </aside>

  <main class="main">
    <div class="header">
      <h1>Candidatos a Especialistas</h1>
      <div id="statsPost" style="font-size: 0.9rem; color: #64748B;">Total: <strong id="totalCount">0</strong></div>
    </div>

    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th>Candidato</th>
            <th>Especialidad</th>
            <th>Exp.</th>
            <th>Documento CV</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="listaPostulaciones">
          <tr><td colspan="6" style="text-align:center; padding:40px; color:#94A3B8;"><i class="fas fa-spinner fa-spin"></i> Cargando postulaciones...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-config.js"></script>
  <script>
    async function loadPostulaciones() {
      if (!window.sb) return setTimeout(loadPostulaciones, 500);
      
      const { data, error } = await window.sb.from('postulaciones').select('*').order('created_at', { ascending: false });
      
      if (error) return console.error(error);
      
      const tbody = document.getElementById('listaPostulaciones');
      document.getElementById('totalCount').textContent = data.length;

      if (data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:40px;">No hay postulaciones nuevas.</td></tr>`;
        return;
      }

      tbody.innerHTML = data.map(p => `
        <tr>
          <td>
            <div style="font-weight:700;">${p.nombre}</div>
            <div style="font-size:0.8rem; color:#94A3B8;">${p.email}</div>
          </td>
          <td>${p.especialidad || 'No especificada'}</td>
          <td>${p.experiencia || '0'} años</td>
          <td>
            <a href="${p.cv_url}" target="_blank" class="btn-cv">
              <i class="far fa-file-pdf"></i> Ver CV
            </a>
          </td>
          <td><span class="status status-${p.estado}">${p.estado}</span></td>
          <td>
            <div class="action-btns">
              <button class="btn-act" onclick="updateStatus('${p.id}', 'revision')" title="Marcar en revisión"><i class="fas fa-eye"></i></button>
              <button class="btn-act btn-delete" onclick="deletePost('${p.id}')" title="Eliminar"><i class="fas fa-trash-alt"></i></button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    async function updateStatus(id, status) {
      await window.sb.from('postulaciones').update({ estado: status }).eq('id', id);
      loadPostulaciones();
    }

    async function deletePost(id) {
      if(confirm('¿Eliminar esta postulación?')) {
        await window.sb.from('postulaciones').delete().eq('id', id);
        loadPostulaciones();
      }
    }

    async function logout() { await window.sb.auth.signOut(); window.location.href = '../login.html'; }
    document.addEventListener('DOMContentLoaded', loadPostulaciones);
  </script>
</body>
</html>
